<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — OmniPost</title>
  <meta name="description" content="The page you were looking for could not be found on OmniPost.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .error-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .error-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-logo {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body class="login-body">
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <div class="error-page">
    <div class="error-logo">🚀</div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-subtitle">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">← Back to Home</a>
      <a href="/dashboard" class="btn btn-secondary">Open Dashboard</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
